name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            main_asset: tunli-main-linux.tar.gz
            launcher_asset: tunli-linux.tar.gz
          - os: macos-latest
            main_asset: tunli-main-macos.tar.gz
            launcher_asset: tunli-macos.tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:sea

      - name: Rename artifacts
        run: |
          mv dist-sea/tunli-main.tar.gz dist-sea/${{ matrix.main_asset }}
          mv dist-sea/tunli-launcher.tar.gz dist-sea/${{ matrix.launcher_asset }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-sea/${{ matrix.main_asset }}
            dist-sea/${{ matrix.launcher_asset }}
